<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Painel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">
  <main class="login-wrapper">
    <div class="login-card">
      <span class="section-tag">Área da administradora</span>
      <h1 class="section-title">Entrar no painel</h1>
      <p class="section-text">Acesso exclusivo para gerenciar os imóveis.</p>

      <form id="loginForm" class="login-form">
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" type="email" placeholder="admin@site.com" required />
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input id="password" type="password" placeholder="********" required />
        </div>

        <button type="submit" class="btn btn-primary full-btn">Entrar</button>
      </form>

      <a href="index.html" class="login-back">← Voltar para o site</a>
    </div>
  </main>

  <script src="auth.js"></script>
</body>
</html>
